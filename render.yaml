services:
  - type: web
    name: salary-management-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_HR_EMAIL
        value: hr@corp.example
      - key: SEED_HR_PASSWORD
        sync: false
      - key: SEED_HR_NAME
        value: HR Manager
