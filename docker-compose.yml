services:
  postgres:
    image: postgres:16-alpine
    container_name: salary_management_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: salary
      POSTGRES_PASSWORD: salary
      POSTGRES_DB: salary_management
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U salary -d salary_management']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
